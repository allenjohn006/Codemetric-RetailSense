services:
  db:
    image: postgres:15
    container_name: retailsense_db
    environment:
      POSTGRES_USER: retailsense_user
      POSTGRES_PASSWORD: retailsense_password
      POSTGRES_DB: retailsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: retailsense_redis
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
    container_name: retailsense_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://retailsense_user:retailsense_password@db:5432/retailsense
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-in-production-min-32-chars

  worker:
    build:
      context: ./backend
    container_name: retailsense_worker
    command: celery -A worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://retailsense_user:retailsense_password@db:5432/retailsense
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-in-production-min-32-chars

  frontend:
    build:
      context: ./frontend
    container_name: retailsense_frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000

volumes:
  postgres_data:
